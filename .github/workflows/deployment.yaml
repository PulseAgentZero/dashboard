name: Build and deploy Frontend

on:
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.js"
      - "tailwind.config.js"
      - "postcss.config.js"
      - "jsconfig.json"
      - "Dockerfile"
      - ".dockerignore"
      - "docker-compose.yml"
  workflow_dispatch:

env:
  DEPLOY_REMOTE_PATH: /home/github/pulse-dashboard

jobs:
  prepare-remote:
    name: Ensure deploy directory
    environment: production
    runs-on: ubuntu-latest
    steps:
      - name: Ensure ${{ env.DEPLOY_REMOTE_PATH }} exists on server
        uses: appleboy/ssh-action@v1.2.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ env.DEPLOY_REMOTE_PATH }}"
            sudo mkdir -p "$DEPLOY_PATH"
            sudo chown -R "${USER}:${USER}" "$DEPLOY_PATH"

  deploy:
    name: Sync and deploy
    needs: prepare-remote
    environment: production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync files to server
        uses: burnett01/rsync-deployments@5.2
        with:
          switches: >-
            -avzr
            --delete
            --exclude '.env'
            --exclude 'node_modules'
            --exclude '.next'
            --exclude '.git'
            --rsync-path="sudo rsync"
          path: ./
          remote_path: ${{ env.DEPLOY_REMOTE_PATH }}
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Build and run with Docker Compose
        uses: appleboy/ssh-action@v1.2.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ env.DEPLOY_REMOTE_PATH }}"
            docker compose down
            docker compose up -d --build --remove-orphans

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "Deployment successful"
          else
            echo "Deployment failed"
            exit 1
          fi
